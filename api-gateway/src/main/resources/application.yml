server:
  port: 8080

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**

        - id: productos-service
          uri: http://localhost:8082
          predicates:
            - Path=/productos/**

        - id: clientes-service
          uri: http://localhost:8083
          predicates:
            - Path=/clientes/**

        - id: pedidos-service
          uri: http://localhost:8084
          predicates:
            - Path=/pedidos/**

security:
  jwt:
    issuer: empresa
    secret: 12345678901234567890123456789012